value = { fg = "{foreground}" }
selected = { fg = "{color0}", bg = "{color9}" }

[cmp]
border = { fg = "{color12}" }
active = { fg = "{color0}", bg = "{color14}" }
inactive = { fg = "{foreground}" }

[tasks]
border = { fg = "{color12}" }
title = { fg = "{color15}" }
hovered = { fg = "{color13}" }

[help]
on = { fg = "{color14}" }
run = { fg = "{color13}" }
hovered = { fg = "{color0}", bg = "{color9}" }
footer = { fg = "{color0}", bg = "{color15}" }

[filetype]
rules = [
  { mime = "image/*", fg = "{color14}" },
  { mime = "audio/*", fg = "{color11}" },
  { mime = "video/*", fg = "{color11}" },
  { mime = "application/zip", fg = "{color13}" },
  { mime = "application/x-rar", fg = "{color13}" },
  { mime = "application/x-7z-compressed", fg = "{color13}" },
  { mime = "application/x-tar", fg = "{color13}" },
  { mime = "application/gzip", fg = "{color13}" },
  { mime = "application/x-bzip2", fg = "{color13}" },
  { mime = "application/pdf", fg = "{color10}" },
  { mime = "vfs/absent", fg = "{color15}" },
  { mime = "vfs/stale", fg = "{color15}" },
  { url = "*", fg = "{foreground}" },
  { url = "*/", fg = "{color12}" },
]

[icon]
append_dirs = [
  { name = ".config", text = "", fg = "{color13}" },
  { name = ".git", text = "", fg = "{color14}" },
  { name = ".github", text = "", fg = "{color12}" },
  { name = ".npm", text = "", fg = "{color12}" },
  { name = "Desktop", text = "", fg = "{color14}" },
  { name = "Documents", text = "", fg = "{color14}" },
  { name = "Downloads", text = "", fg = "{color14}" },
]

append_conds = [
  { if = "orphan", text = "", fg = "{color15}" },
  { if = "link", text = "", fg = "{color8}" },
  { if = "dir", text = "", fg = "{color12}" },
  { if = "exec", text = "", fg = "{color10}" },
  { if = "!dir", text = "", fg = "{foreground}" },
]
