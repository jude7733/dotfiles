tbl_col = { fg = "{color14}" }
tbl_cell = { fg = "{color15}", bg = "{color8}" }

[notify]
title_info = { fg = "{color10}" }
title_warn = { fg = "{color11}" }
title_error = { fg = "{color9}" }

[pick]
border = { fg = "{color12}" }
active = { fg = "{color13}" }
inactive = { fg = "{color8}" }

[input]
border = { fg = "{color12}" }
