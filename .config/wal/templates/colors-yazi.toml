perm_type = { fg = "{color12}" }
perm_read = { fg = "{color11}" }
perm_write = { fg = "{color9}" }
perm_exec = { fg = "{color10}" }
progress_label = { fg = "{foreground}" }
progress_normal = { fg = "{color0}", bg = "{color10}" }
